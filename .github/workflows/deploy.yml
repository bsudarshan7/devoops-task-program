name: Deploy Python File

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install paramiko

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > my-key.pem
          chmod 400 my-key.pem

      - name: Deploy to EC2
        run: python deploy.py
